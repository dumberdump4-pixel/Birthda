<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 🎂</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #ffd6e8, #ffe8cc, #fff0f6);
      overflow:hidden;
      position:relative;
    }

    .card{
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      padding:50px 40px;
      border-radius:30px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.12);
      width:90%;
      max-width:600px;
      z-index:2;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-8px); }
    }

    h1{
      font-size:3rem;
      color:#ff4d88;
      margin-bottom:10px;
    }

    .cake{
      font-size:4rem;
      margin:10px 0 20px;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-10px); }
    }

    p{
      font-size:1.1rem;
      color:#555;
      line-height:1.8;
      margin-bottom:25px;
    }

    button{
      background:#ff4d88;
      color:white;
      border:none;
      padding:14px 28px;
      font-size:1rem;
      border-radius:50px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 8px 20px rgba(255,77,136,0.35);
    }

    button:hover{
      transform:scale(1.05);
      background:#ff2f74;
    }

    .hearts{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:1;
    }

    .heart{
      position:absolute;
      color:#ff8fb1;
      font-size:20px;
      animation: rise linear infinite;
    }

    @keyframes rise{
      from{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
      }
      to{
        transform:translateY(-10vh) scale(1.2);
        opacity:1;
      }
    }
  </style>
</head>
<body>

  <!-- Floating hearts -->
  <div class="hearts" id="hearts"></div>

  <!-- Birthday Card -->
  <div class="card">
    <h1>Happy Birthday!</h1>
    <div class="cake">🎂</div>
    <p>
      Wishing you a day filled with love, laughter, happiness,
      and all the beautiful moments your heart deserves. 💖
      May this year bring you endless success and unforgettable memories.
    </p>

    <button onclick="celebrate()">Celebrate 🎉</button>
  </div>

  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    // Confetti animation
    function celebrate() {
      confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
      });
    }

    // Auto confetti on load
    setTimeout(celebrate, 700);

    // Floating hearts generator
    const hearts = document.getElementById('hearts');

    function createHeart(){
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤';
      heart.style.left = Math.random()*100 + 'vw';
      heart.style.animationDuration = (4 + Math.random()*5) + 's';
      heart.style.fontSize = (16 + Math.random()*24) + 'px';
      hearts.appendChild(heart);

      setTimeout(()=>heart.remove(), 9000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
